name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    env:
      E2E_TEST_USER_EMAIL: test-procyon@cwchanap.dev
      E2E_TEST_USER_USERNAME: test-procyon
      SUPABASE_URL: http://localhost:54321
      PUBLIC_SUPABASE_URL: http://localhost:54321
      PUBLIC_GOOGLE_CLIENT_ID: test-client-id.apps.googleusercontent.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.1"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Setup Node (for Playwright tooling)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.65.6

      - name: Start Supabase (local)
        run: supabase start

      - name: Export Supabase keys
        run: |
          strip_quotes() {
            printf '%s' "$1" | sed -e "s/^['\"]//" -e "s/['\"]$//"
          }

          for i in $(seq 1 30); do
            STATUS_ENV=$(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=' || true)
            SUPABASE_URL=$(strip_quotes "$(printf '%s\n' "$STATUS_ENV" | sed -n 's/^API_URL=//p')")
            SUPABASE_ANON_KEY=$(strip_quotes "$(printf '%s\n' "$STATUS_ENV" | sed -n 's/^ANON_KEY=//p')")
            SUPABASE_SERVICE_ROLE_KEY=$(strip_quotes "$(printf '%s\n' "$STATUS_ENV" | sed -n 's/^SERVICE_ROLE_KEY=//p')")

            if [ -n "$SUPABASE_URL" ] && [ "$SUPABASE_URL" != "null" ] && \
               [ -n "$SUPABASE_ANON_KEY" ] && [ "$SUPABASE_ANON_KEY" != "null" ] && \
               [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ "$SUPABASE_SERVICE_ROLE_KEY" != "null" ]; then
              echo "SUPABASE_URL=$SUPABASE_URL" >> "$GITHUB_ENV"
              echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$GITHUB_ENV"
              echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
              echo "PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> "$GITHUB_ENV"
              echo "PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "Supabase keys not ready yet (attempt $i/30), waiting..."
            sleep 2
          done

          echo "Supabase keys were not available after waiting."
          exit 1

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Run API database migrations
        working-directory: apps/api
        run: bun run db:migrate

      - name: Seed puzzle data
        working-directory: apps/api
        run: bun run db:seed

      - name: Start API server
        env:
          NODE_ENV: e2e
          JWT_SECRET: e2e-test-secret-must-be-at-least-32-chars-long
        run: |
          set -e
          cd apps/api
          echo "Starting API server..."
          bun src/index.ts &
          API_PID=$!
          echo "API server PID: $API_PID"
          sleep 3
          if ! kill -0 $API_PID 2>/dev/null; then
            echo "API server failed to start"
            exit 1
          fi
          echo "API server started successfully"

      - name: Start web dev server
        env:
          PUBLIC_API_URL: "http://localhost:3501/api"
          PUBLIC_GOOGLE_CLIENT_ID: "test-client-id.apps.googleusercontent.com"
          ASTRO_DISABLE_DEV_TOOLBAR: "true"
        run: |
          set -e
          cd apps/web
          echo "Starting web dev server..."
          bun run dev &
          WEB_PID=$!
          echo "Web server PID: $WEB_PID"
          sleep 3
          if ! kill -0 $WEB_PID 2>/dev/null; then
            echo "Web server failed to start"
            exit 1
          fi
          echo "Web server started successfully"

      - name: Wait for web and API to be ready
        run: |
          timeout 120 bash -c '
            until curl -sSf http://localhost:3500 >/dev/null; do
              echo "Waiting for web server on :3500...";
              sleep 5;
            done;
            until curl -sSf http://localhost:3501/health >/dev/null; do
              echo "Waiting for API server on :3501/health...";
              sleep 5;
            done;
          '

      - name: Seed E2E test user via API
        env:
          PUBLIC_API_URL: "http://localhost:3501/api"
        run: |
          E2E_EMAIL="${E2E_TEST_USER_EMAIL:-test-procyon@cwchanap.dev}"
          E2E_USERNAME="${E2E_TEST_USER_USERNAME:-test-procyon}"
          CLAIM_PAYLOAD=$(printf '{"sub":"e2e-%s","email":"%s","emailVerified":true,"name":"%s"}' "$E2E_EMAIL" "$E2E_EMAIL" "$E2E_USERNAME")
          CLAIM_TOKEN="test-claim:${CLAIM_PAYLOAD}"
          REQUEST_BODY=$(printf '{"id_token":"%s"}' "$CLAIM_TOKEN")

          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${PUBLIC_API_URL}/auth/google" \
              -H "Content-Type: application/json" \
              -d "$REQUEST_BODY")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "E2E test user seeded successfully"
              exit 0
            fi
            echo "Seed attempt $i returned $HTTP_CODE, retrying..."
            sleep 2
          done
          echo "Warning: Could not seed E2E test user (tests will create user on first login)"

      - name: Run Playwright tests
        working-directory: apps/web
        env:
          CI: "true"
          PLAYWRIGHT_SKIP_WEB_SERVER: "1"
        run: bun run test:e2e
